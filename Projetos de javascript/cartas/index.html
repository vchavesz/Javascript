<!DOCTYPE html>
<html lang="pt-br" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Super Trunfo</title>
    <!-- Incluir uma folha de estilos externa -->
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <h1>Super Trunfo - Copa 2026</h1>
    <p>Preencha os campos abaixo para gerar a sua carta</p>

    <p>
      <label>Nome da carta</label>
      <input id="nome-da-carta" type="text" value="" placeholder="Nome da carta" onfocus="console.log('Insira o nome!')" />
    </p>

    <p>
      <label>Imagem da carta</label>
      <input id="imagem-da-carta" type="url" value="" placeholder="Insira a URL de uma imagem" />
    </p>

    <p>
      <label>Copas</label>
      <input id="atributo-copas" type="number" min="0" max="5" value="" onchange="validarNumero()" />
    </p>

    <p>
      <label>Ranking FIFA</label>
      <input id="atributo-ranking" type="number" value="" />
    </p>

    <p>
      <label>Vitórias</label>
      <input id="atributo-vitorias" type="number"  value="" />
    </p>

    <p>
      <input type="button" value="Criar carta" onclick="criarCarta()" />
    </p>

    
  
    <section id="cartas">

      <div>
        <h3>Brasil</h3>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Brazilian_Football_Confederation_logo.svg/1920px-Brazilian_Football_Confederation_logo.svg.png">
        <ul>
          <li>Copas: 5</li>
          <li>Ranking Fifa: 6</li>
          <li>Vitórias em Copas: 76</li>
          <input type="button" value="Remover carta" onclick="removerCarta()" />
        </ul>
      </div>

    </section>

    <script src="super-trunfo.js"></script>
  </body>
</html>
