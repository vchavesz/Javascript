<!DOCTYPE html>
<html lang="PT-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <h1>Vamos fazer uma carta da copa do mundo</h1>
    <p>Preencha as coisas abaixo para gerar sua carta</p>
    
    <p>
    <label>Nome da carta </label>
    <input id="nome-da-carta" type="text" valeu="" placeholder="Nome da carta ">
    </p>
    
    <p>
    <label>Imagem da Carta</label>
    <input id="imagem-da-carta" type="url" value="" placeholder="Insira a url de uma imagem">
    </p>

    <p>
    <label>Quantas copa tem sua seleção</label>
    <input id="quantas-copas" type="number" valeu="" placeholder="Insira quantas copas sua seleção tem ">
    </p>

    <p>
    <label>Qual melhor jogador da sua seleção</label>
    <input id="melhor-jogador" type="text" valeu="" placeholder="Insira o melhor jogador da sua seleção ">
    </p>

    <input type="button" value="Criar Carta" onclick="criarCarta()">




    <script src="cartas.js"></script>
</body>
</html>
