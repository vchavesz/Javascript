
<!DOCTYPE html>
<html lang="pt-br" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Aula 13 - Document</title>
    <style>
      body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .cartao {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        #titulo-pet {
            color: #333;
            margin-top: 0;
        }
        .moldura-imagem {
            width: 200px;
            height: 200px;
            border-radius: 50%; /* Faz a moldura redonda */
            overflow: hidden; /* Garante que a imagem fique dentro do círculo */
            border: 5px solid #ddd;
            margin: 0 auto 20px auto; /* Centraliza a moldura */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #eee;
        }
        #imagem-pet {
            /* Faz a imagem preencher a moldura sem distorcer */
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .container-botoes {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        #btn-cao {
            background-color: #4CAF50;
            color: white;
        }
        #btn-cao:hover {
            background-color: #45a049;
        }
        #btn-gato {
            background-color: #2196F3;
            color: white;
        }
        #btn-gato:hover {
            background-color: #1e88e5;
        }
    </style>
  </head>
  <body>
    <div class="cartao">
      <h1 id="titulo-pet">Cachorrinho</h1>

      <div class="moldura-imagem">
          <img id="imagem-pet"
               src=""
               alt="Foto de um cachorro">
      </div>

      <div class="container-botoes">
          <button id="btn-cao" onclick="mostrarCachorro()">Ver Cachorro</button>
          <button id="btn-gato" onclick="mostrarGato()">Ver Gato</button>
      </div>

      <div class="container-botoes">
          <button id="btn-background" onclick="mudarBackground()">Mudar Background</button>
      </div>

      <script src="pet.js"></script>
    </div>
  </body>
</html>
